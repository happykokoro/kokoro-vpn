services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: kokoro-vpn
    environment:
      - LANG=en
      - WG_HOST=${WG_HOST:?Set WG_HOST in .env}
      - PASSWORD_HASH=${PASSWORD_HASH}
      - WG_PORT=${WG_PORT:-51820}
      - WG_DEFAULT_ADDRESS=${WG_DEFAULT_ADDRESS:-10.8.0.x}
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS:-1.1.1.1,8.8.8.8}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS:-0.0.0.0/0,::/0}
      - UI_TRAFFIC_STATS=true
      - UI_CHART_TYPE=2
    volumes:
      - wg-data:/etc/wireguard
    ports:
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
      - "${UI_PORT:-51821}:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped

  # Optional: reverse proxy with auto-SSL
  # Uncomment this section and set DOMAIN/EMAIL in .env
  # caddy:
