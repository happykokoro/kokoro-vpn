services:
  # ---- New: Axum API Backend ----
  api:
    build: ./server
    container_name: kokoro-vpn-api
    env_file: ./server/.env
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - api-data:/app/data
    network_mode: host  # Needed to access WireGuard on host
    restart: unless-stopped

